{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
  <h2>Create Patient Record</h2>
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">Save</button>
    <a href="{% url 'records_list' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
