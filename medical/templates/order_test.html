{% extends 'base.html' %}
{% load static %}
{% block content %}
  <div class="container">
    <h2>Order Your Lab Test</h2>
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label for="test_type">Test Type</label>
        <select class="form-control" id="test_type" name="test_type" required>
          <option value="Blood Test">Blood Test</option>
          <option value="Pathology">Pathology</option>
          <option value="ECG">ECG</option>
        </select>
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" class="form-control" id="email" name="email" required>
      </div>
      <button type="submit" class="btn btn-primary">Order Test</button>
    </form>
  </div>

  <!-- Success Popup -->
  {% if form_submitted %}
    <script type="text/javascript">
      alert("Your test order has been successfully received. Please download your form and head to the laboratory.");
      window.location.href = "{% url 'download_test_form' test_id=form_id %}";  // Redirect to download the form
    </script>
  {% endif %}

{% endblock %}
